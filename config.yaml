ontology:
    entity_types:
        - description: |
            A contaminated site or area of concern, including boundaries, land use, and regulatory listing status. May be a facility, stockpile area, or parcel.
          name: site
        - description: |
            A chemical substance of concern at a site (e.g., barium, lead, arsenic, PAHs). Includes regulatory thresholds, fate/transport properties, and media where detected.
          name: contaminant
        - description: |
            A fixed physical point where samples are collected — monitoring wells (MW-1), test pits, stormwater outfalls, fenceline stations, surface water stations.
          name: monitoring_location
        - description: |
            A discrete sampling effort at a point in time — groundwater monitoring round, stormwater event, soil verification sampling, air monitoring during construction.
          name: sampling_event
        - description: |
            A physical remediation activity: excavation, capping, containment, well destruction, stockpile consolidation, clean fill placement.
          name: remedial_action
        - description: |
            A measured value from sampling — analyte concentration, detection status, comparison to threshold. Carries analytical method, detection limits, and QA/QC flags.
          name: monitoring_result
        - description: |
            Engineered features related to the remedy: MSE walls, bridge abutments, retaining walls, clean caps, drainage systems, infiltration barriers.
          name: infrastructure
        - description: |
            A formal agency action — approval, conditional approval, denial, comment letter, acceptance, closure determination. Carries the deciding agency, date, conditions, and linked documents.
          name: regulatory_decision
        - description: |
            An entity bearing legal liability or operational responsibility for the site: owner-operator (Caltrans), lead agency (DTSC), co-regulator (RWQCB), consultant (Geocon), contractor.
          name: responsible_party
        - description: |
            A numeric or qualitative threshold used to evaluate site conditions — MCLs, background concentrations, screening levels, action levels, 95% UCL criteria, clean fill thresholds.
          name: regulatory_standard
        - description: |
            A required document in the remediation workflow — RAP, RDIP, RACR, workplan, monitoring report, HHRA, SSI, O&M plan. Carries submission/approval dates and review status.
          name: deliverable
        - description: |
            An assertion about site conditions, outcomes, or adequacy of the remedy — "no groundwater impact", "soil suitable as clean cover", "barium exceeds MCL". May be contested, supported, or refuted by evidence.
          name: claim
        - description: |
            A identified hazard or exposure pathway — cancer risk from inhalation, groundwater contamination pathway, community exposure via dust. Carries risk characterization, receptor population, and mitigation measures.
          name: risk
        - description: |
            A legal or financial exposure tied to site conditions — CERCLA liability, cost recovery, enforcement actions, land use restrictions, covenant obligations.
          name: liability
        - description: |
            A concern raised by or on behalf of affected communities — unauthorized access, dust exposure, property value impacts, notification adequacy, bilingual communication.
          name: community_concern
    relation_types:
        - name: contaminates
          synonyms:
            - pollutes
            - taints
            - contains
        - name: located_at
          synonyms:
            - situated_at
            - found_at
            - sampled_at
        - name: exceeds
