# sage-wiki configuration
# Docs: https://github.com/xoai/sage-wiki

version: 1
project: envirostor-wiki
description: "sage-wiki project: envirostor-wiki"

sources:
  - path: raw
    type: auto          # auto-detect from file extension
    watch: true

output: wiki

# LLM provider configuration
# Supported: anthropic, openai, gemini, ollama, openai-compatible, qwen
# For OpenRouter or other OpenAI-compatible providers, set:
#   provider: openai-compatible
#   base_url: https://openrouter.ai/api/v1
# For Alibaba Cloud DashScope Qwen, set:
#   provider: qwen
#   api_key: ${DASHSCOPE_API_KEY}
api:
  provider: openai-compatible
  api_key: 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
  base_url: https://openrouter.ai/api/v1          # custom endpoint (OpenRouter, Azure, local proxy, etc.)
  # rate_limit: 60      # requests per minute (default: auto per provider)

# Model selection per task
# Use faster/cheaper models for high-volume tasks, quality models for writing
models:
  summarize: deepseek/deepseek-v4-flash
  extract: deepseek/deepseek-v4-flash
  write: deepseek/deepseek-v4-flash
  lint: deepseek/deepseek-v4-flash
  query: deepseek/deepseek-v4-flash

# Embedding configuration (optional — auto-detected from api provider)
# Override to use a different provider/model for embeddings
embed:
  provider: openai        # auto, openai, gemini, ollama, voyage, mistral
  model: text-embedding-3-large             # override model (e.g., text-embedding-3-small)
  api_key: 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           # separate API key for embeddings
  base_url: https://api.openai.com/v1          # separate endpoint for embeddings

compiler:
  max_parallel: 4
  debounce_seconds: 2
  summary_max_tokens: 2000
  article_max_tokens: 4000
  auto_commit: true
  auto_lint: true
  # timezone: Asia/Shanghai   # IANA timezone for user-facing timestamps (default: UTC)
  # article_fields:           # custom frontmatter fields extracted from LLM response
  #   - language
  #   - domain

search:
  hybrid_weight_bm25: 0.7
  hybrid_weight_vector: 0.3
  default_limit: 10

serve:
  transport: stdio      # stdio or sse
  port: 3333            # SSE mode only

# Ontology types (optional)
# Extend built-in types with additional synonyms or add custom types.
#
# Built-in relation types: implements, extends, optimizes, contradicts, cites,
#                          prerequisite_of, trades_off, derived_from
# Built-in entity types: concept, technique, source, claim, artifact
